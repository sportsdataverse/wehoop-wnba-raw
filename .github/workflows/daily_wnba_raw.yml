name: Daily WNBA Raw Scrape

# Umbrella workflow that runs every per-dataset Python scraper in sequence and
# commits the cumulative output in a single push. The single push is intentional
# — wehoop_wnba_data_trigger.yml watches push events on main and fires the
# repository_dispatch to wehoop-wnba-data, so one push per day means one
# downstream dispatch per day.
#
# Cadence is staggered ~2h ahead of wehoop-wnba-data/daily_wnba.yml (which
# fires at 07:00 UTC) so the parser side always sees fresh raw JSON. The
# month/day windows mirror the in-season ranges used by the data repo's
# daily workflow so we don't burn compute scraping during the offseason.
#
# Note: scrape_wnba_draft.py is intentionally NOT included here. The draft
# scrape has its own annual workflow that fires wehoop_wnba_draft_trigger.yml;
# rolling it into the daily would re-trigger the draft pipeline 365 times a
# year for no benefit.

on:
  schedule:
    - cron: '30 6 1-12 5-10 *'    # May - October (regular season + playoffs)
  workflow_dispatch:
    inputs:
      start_year:
        description: 'Start season year (YYYY)'
        required: false
        default: '2026'
      end_year:
        description: 'End season year (YYYY)'
        required: false
        default: '2026'
      rescrape:
        description: 'Force re-scrape of files already on disk'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  daily_wnba_raw:
    runs-on: [self-hosted, sdv-droplet]
    env:
      START_YEAR: ${{ github.event.inputs.start_year || '2026' }}
      END_YEAR: ${{ github.event.inputs.end_year || '2026' }}
      RESCRAPE: ${{ github.event.inputs.rescrape || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.SDV_GH_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install "sportsdataverse>=0.0.50" tqdm

      - name: Scrape schedules
        run: python python/scrape_wnba_schedules.py --start_year "$START_YEAR" --end_year "$END_YEAR" -r "$RESCRAPE"

      - name: Scrape per-game JSON (PBP)
        run: python python/scrape_wnba_json.py --start_year "$START_YEAR" --end_year "$END_YEAR" -r "$RESCRAPE"

      - name: Scrape team rosters
        run: python python/scrape_wnba_team_rosters.py --start_year "$START_YEAR" --end_year "$END_YEAR" -r "$RESCRAPE"

      - name: Scrape player season stats
        run: python python/scrape_wnba_player_stats.py --start_year "$START_YEAR" --end_year "$END_YEAR" -r "$RESCRAPE"

      - name: Scrape team season stats
        run: python python/scrape_wnba_team_stats.py --start_year "$START_YEAR" --end_year "$END_YEAR" -r "$RESCRAPE"

      - name: Scrape standings
        run: python python/scrape_wnba_standings.py --start_year "$START_YEAR" --end_year "$END_YEAR" -r "$RESCRAPE"

      - name: Scrape per-game rosters
        run: python python/scrape_wnba_game_rosters.py --start_year "$START_YEAR" --end_year "$END_YEAR" -r "$RESCRAPE"

      - name: Scrape per-game officials
        run: python python/scrape_wnba_officials.py --start_year "$START_YEAR" --end_year "$END_YEAR" -r "$RESCRAPE"

      - name: Commit any new JSON files
        run: |
          git config --local user.name  "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add wnba/
          if [ -n "$(git status --porcelain)" ]; then
            # Commit message format must keep ONLY the start + end years
            # as digits. The downstream `wehoop-wnba-data` daily
            # workflow parses with `grep -oE '[0-9]+'` to extract
            # START_YEAR (head -1) and END_YEAR (tail -1). Extra
            # numbers (date, run id, etc.) get captured as END_YEAR
            # and the parser fails. Match the legacy bot format.
            git commit -m "WNBA Raw Update (Start: ${{ env.START_YEAR }} End: ${{ env.END_YEAR }})"
            git push
          else
            echo "No new files to commit"
          fi
