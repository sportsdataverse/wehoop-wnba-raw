# Only fire when the scraped data tree actually changes. Pushes that
# touch only scripts, workflows, .gitignore, or other repo plumbing
# should NOT wake the downstream wehoop-wnba-data parser. The draft
# subtree has its own trigger (wehoop_wnba_draft_trigger.yml) and is
# excluded here so draft pushes don't fire both pipelines.
on:
  push:
    paths:
      - 'wnba/**'
      - '!wnba/draft/**'
  workflow_dispatch:

name: wehoop WNBA Data trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    wehoop_wnba_data_trigger:
        runs-on: ubuntu-latest
        steps:
            - name: Trigger wehoop WNBA Data
              uses: peter-evans/repository-dispatch@v3
              with:
                  token: ${{ secrets.SDV_GH_TOKEN }}
                  repository: sportsdataverse/wehoop-wnba-data
                  event-type: daily_wnba_data
                  # `toJSON(...)` properly escapes embedded newlines, quotes, and
                  # control characters in the commit message so the
                  # client-payload stays valid JSON. Multi-line commit bodies
                  # broke the previous interpolation with
                  # `Bad control character in string literal in JSON at
                  # position N`.
                  client-payload: |-
                    {
                      "ref": "refs/heads/main",
                      "event_name": "daily_wnba_data",
                      "commit_message": ${{ toJSON(github.event.head_commit.message) }}
                    }
